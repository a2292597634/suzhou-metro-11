<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>商业信息管理 - 苏州地铁11号线商业信息综合平台</title>
<link rel="stylesheet" href="css/platform.css?v=18">
<link rel="stylesheet" href="css/data-viz.css?v=1">
</head>
<body>

<section id="page-data-viz" class="page-section active enter-up">

  <!-- 页面标题 -->
  <div class="page-header">
    <h1 class="page-title">商业信息管理</h1>
    <p class="page-desc">管理全线车站商业点位、经营状态与站点价值等级，支持按等级筛选、排序和批量调整</p>
  </div>

  <!-- 图表概览行 -->
  <div class="charts-row" id="chartsRow">
    <div class="chart-container" id="barChart"></div>
    <div class="chart-container" id="statusChart"></div>
  </div>

  <!-- 筛选工具栏 -->
  <div class="toolbar">
    <div class="toolbar-group">
      <span class="toolbar-label">等级筛选</span>
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="S">S级</button>
      <button class="filter-btn" data-filter="A">A级</button>
      <button class="filter-btn" data-filter="B">B级</button>
      <button class="filter-btn" data-filter="C">C级</button>
    </div>
    <div class="toolbar-group">
      <span class="toolbar-label">排序</span>
      <button class="filter-btn active" data-sort="default">默认</button>
      <button class="filter-btn" data-sort="rate-desc">出租率 ↓</button>
      <button class="filter-btn" data-sort="rate-asc">出租率 ↑</button>
      <button class="filter-btn" data-sort="shops-desc">商铺数 ↓</button>
    </div>
  </div>

  <!-- 统计卡片网格 -->
  <div id="cardsGrid" class="cards-grid">
    <div class="loading-state">正在加载数据……</div>
  </div>

  <section id="gradeManager" class="grade-manager" aria-labelledby="gradeManagerTitle"></section>

  <!-- 保存提示 -->
  <div id="saveToast" class="save-toast"></div>

</section>

<script type="module" src="js/pages/data-viz-page.js?v=1"></script>

</body>
</html>
