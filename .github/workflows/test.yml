name: 测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'false'
      PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: metro123
          POSTGRES_DB: suzhou_metro
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装 E2E 浏览器
        run: |
          rm -rf "$PUPPETEER_CACHE_DIR"
          CHROME_VERSION="$(node -p "require('puppeteer-core/internal/revisions.js').PUPPETEER_REVISIONS.chrome")"
          node node_modules/@puppeteer/browsers/lib/cjs/main-cli.js install "chrome@$CHROME_VERSION" --path "$PUPPETEER_CACHE_DIR"
          node -e "const fs = require('node:fs'); const puppeteer = require('puppeteer'); const executable = puppeteer.executablePath(); if (!fs.existsSync(executable)) throw new Error('Chrome executable missing: ' + executable); console.log('Chrome ready:', executable)"

      - name: 生成 Prisma Client
        run: npx prisma generate

      - name: 创建测试数据库
        run: |
          PGPASSWORD=metro123 psql -h localhost -U postgres -c "CREATE DATABASE suzhou_metro_test;" 2>/dev/null || echo "测试数据库已存在"
          PGPASSWORD=metro123 psql -h localhost -U postgres -d suzhou_metro_test -c "SELECT 1;" || echo "测试数据库就绪"
        env:
          PGPASSWORD: metro123

      - name: 运行数据库迁移（测试库）
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:metro123@localhost:5432/suzhou_metro_test?schema=public

      - name: 运行种子数据（测试库）
        run: npx prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:metro123@localhost:5432/suzhou_metro_test?schema=public

      - name: 启动服务（测试库）
        run: |
          node server.js &
          echo "等待服务就绪..."
          npx wait-on http://localhost:3000/api/data --timeout 30000
        env:
          DATABASE_URL: postgresql://postgres:metro123@localhost:5432/suzhou_metro_test?schema=public
          AUTH_TOKEN: ci-test-token
          ALLOWED_ORIGINS: http://localhost:3000
          SESSION_SECRET: ci-session-secret

      - name: 运行全量测试（含 E2E）
        run: npm run test:all
        env:
          DATABASE_URL: postgresql://postgres:metro123@localhost:5432/suzhou_metro_test?schema=public
          AUTH_TOKEN: ci-test-token
          ALLOWED_ORIGINS: http://localhost:3000
          SESSION_SECRET: ci-session-secret
          PORT: 3000
