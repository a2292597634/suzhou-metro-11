services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: metro123
      POSTGRES_DB: suzhou_metro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:metro123@postgres:5432/suzhou_metro?schema=public"
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
