schema: spec-driven

# Project context - AI reads this when creating artifacts
context: |
  Project: 苏州地铁11号线商业开发作战图（21:9 超宽比例，适合打印海报）
  Tech stack: 前端原生 HTML5/CSS3/JavaScript (ES Modules) + 后端 Node.js/Express 5 + Prisma ORM + PostgreSQL
  Auth: HttpOnly 签名 Cookie + 登录端点（POST /api/login），同时兼容 Bearer Token
  Database: PostgreSQL（Prisma ORM 管理）
  ORM: Prisma
  Frontend: 原生 HTML + CSS + Vanilla JS，无构建工具，无框架
  Backend: Express 5
  Testing: TDD 硬性要求，先写测试再写实现，测试未通过不算完成。详细规范见 openspec/testing-strategy.md

  Directory Conventions (目录约定):
    index.html          — 主页面
    css/style.css       — 全局样式
    js/                 — 前端代码
      xlsx.full.min.js   — SheetJS Excel 库
      modules/           — 模块化前端代码
        main.js          — 应用入口，全局状态初始化，事件绑定
        state.js         — 共享状态（所有模块的中心数据源）
        data.js          — 数据管理（CRUD、导入导出、默认数据）
        render.js        — 渲染引擎（SVG 线路、站点卡片、统计面板）
        interaction.js   — 用户交互（编辑、弹窗、提示、事件监听）
        viewport.js      — 缩放、平移、触摸控制
        utils.js         — 纯工具函数（边界处理、计算、防重叠）
    server.js           — Express 后端入口，REST API
    prisma/             — Prisma schema、迁移、seed
      schema.prisma     — 数据模型定义
      seed.js           — 初始数据填充
      migrations/       — 迁移文件
    data/               — 数据文件（legacy SQLite）
    assets/             — 静态资源（背景图等）
    tools/              — 工具脚本（高清导出、隧道工具）
    openspec/           — 规范文档，禁止放代码
      testing-strategy.md — 测试策略规范（所有 change 必须遵守）
      templates/          — 可复用模板
        testing-checklist.md — 测试检查清单（嵌入每个 tasks.md）
    .env                — 环境变量（数据库连接字符串）

  Coding Conventions (编码约定):
    - JavaScript 代码注释使用中文
    - UI 文案使用中文
    - 变量/函数名使用 camelCase
    - CSS 类名使用 kebab-case
    - 模块间通过 state.js 共享状态
    - 状态变更后走 calcGlobalStats → renderAll → bindEventsAfterRender → saveData 流程
    - API 端点：GET /api/data, POST /api/data, POST /api/login, POST /api/logout, GET /api/auth-status, GET /api/ip
    - 数据加载优先级：服务器 API → localStorage → 硬编码默认值
    - CSS 使用自定义属性（CSS Variables）定义主题色
    - TDD 流程：先写失败测试 (Red) → 再写实现使其通过 (Green) → 最后重构 (Refactor)。实现代码必须由测试驱动，禁止先写实现后补测试

# Per-artifact rules
rules:
  # 全局规则（适用于所有 artifact）
  global:
    - 语言规范：所有文档、代码注释、commit 信息、Markdown 文件必须使用中文，仅保留必要的英文（专有名词、代码标识符、API 路径、技术关键字）

    # ━━━━━ 【红线】严禁自主执行的操作 ━━━━━
    # 以下三个操作必须获得用户明确确认后才能执行，严禁以"顺手下去了""流程就该这么走"为由跳过确认步骤。
    # 用户说"commit吧""archive吧"只代表确认了当前这一个操作，不代表确认了后续的其他操作。
    - 禁止自主 commit：必须先展示变更文件列表和 commit message，等用户回复"可以""commit吧""提交"等明确指令后才能执行 git commit
    - 禁止自主 archive：必须先告知用户即将归档，等用户回复确认后才能执行 archive（移动目录 + 同步 specs）
    - 禁止自主 push：git commit 成功后自动执行 push（用户已确认过 commit，push 是对 commit 的自动跟进）。但如果 push 失败必须告知用户

    - 设计规范：每次进行界面设计或前端开发时，必须使用 frontend-design skill，并严格遵循项目根目录 DESIGN.md 中定义的设计系统（颜色、字体、间距、阴影、圆角、材质、动效）
    - 测试规范：每个 change 必须遵守 openspec/testing-strategy.md 定义的三层测试金字塔。不得跳过测试任务，不得先写实现后补测试
    - 回归测试：每次 change apply 完成后必须运行 npx vitest run 完整回归测试，确认所有已有测试仍然通过，有失败先修复再报告完成
    - 一致性检查：每次 git commit 前必须重读 change 目录下 proposal.md / design.md / specs/*.md / tasks.md 四个 artifact，对比实际实现内容，发现不一致立即修正后再 commit
    - 归档流程：先执行 archive（移动目录 + 同步 specs），再一次性 commit 全部变更（实现代码 + OpenSpec 文档 + 归档），一个 change 只产生一个 commit

  # 探索阶段规则
  explore:
    - 遵循小步迭代原则，每次探索聚焦一个明确的功能点或问题
    - 进行垂直切割（每个变更独立可交付、可验证），禁止水平切割（禁止一次性大范围修改）
    - 输出清晰的需求和方向，为后续 propose 提供依据

  # 提案阶段规则
  proposal:
    - change 命名：格式 YYYY-MM-DD-<动词>-<目标>，动词限定 add/refactor/fix/improve/remove，目标 kebab-case
    - 必须包含成功标准 (Success Criteria)：列出可验证的完成条件
    - Impact 必须列出具体的文件/目录变更，不使用模糊描述
    - proposal 声明的 capability 必须与 specs/ 目录一一对应
    - 必须包含测试策略段落：说明本 change 需要哪一层测试（单元/集成/E2E），依据 openspec/testing-strategy.md 的变更类型映射表

  # 设计阶段规则
  design:
    - 必须包含目录树 (Directory Layout)，展示关键文件和目录结构
    - 每个技术决策必须在对应的 spec 中有 Requirement 覆盖
    - 所有 artifact 中的示例值必须一致（如端口号、路径、变量名）
    - Open Questions 不允许写"无"——至少列出 2 个待确认的假设或风险
    - 必须包含测试架构设计段落：说明测试分层策略、测试文件位置、需要 mock 的外部依赖

  # 规范阶段规则
  specs:
    - SHALL 语句必须具体可验证：包含具体的值、路径、格式
    - 禁止使用"或类似工具"等模糊表述，必须指定具体技术
    - 所有 artifact 中的示例值必须一致
    - 每个 Scenario 必须可自动化验证或可通过明确步骤手动验证
    - spec 中的每个 Requirement 必须有至少一个 task 实现它
    - 每个 spec 文件末尾必须包含 Testing Notes：说明该 spec 对应的测试策略和预期测试覆盖点

  # 任务阶段规则
  tasks:
    - TDD 执行：每个功能点必须严格执行 Red → Green → Refactor 三步，测试未通过不算完成
    - 先写失败测试（Red）→ 再写最小实现（Green）→ 最后重构（Refactor），顺序不可颠倒
    - 每个功能模块任务组必须有对应的测试任务组（如「2.1 实现 xxx」对应「2.T 测试 xxx」）
    - 任务粒度控制在单个会话可完成
    - 必须声明任务间依赖（当任务 A 依赖任务 B 的产出时）
    - 每个 task group 必须可独立验证完成
    - 所有 spec Requirement 必须有对应 task 覆盖（正向追溯）
    - 安装依赖必须作为显式 task，不允许隐含在其他 task 中
    - 新增测试基础设施（测试框架、测试库、配置等）必须作为显式 task，不可隐含在其他 task 中
    - tasks.md 末尾必须嵌入 openspec/templates/testing-checklist.md 作为验收清单

  # 测试阶段规则
  testing:
    - 单元测试底线：每个新增/修改的 js/modules/*.js 必须有 tests/<模块名>.test.js
    - 测试文件命名：tests/<模块名>.test.js（单元）、tests/integration/<场景>.test.js（集成）、tests/e2e/<场景>.test.js（E2E）
    - 每个测试文件至少包含 3 个测试用例（describe/it）
    - 测试描述必须使用中文，读起来像完整断言（如「应该从无文件名路径解析首页」）
    - 禁止 mock 掉核心业务逻辑来伪造测试通过
    - 变更涉及 2+ 模块联动时必须编写集成测试
    - 新增/重构页面或核心流程时必须编写 E2E 测试
    - 最终完成前必须运行 node scripts/check-test-coverage.js 确认通过
