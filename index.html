<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苏州轨道交通11号线商业开发作战图</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 21:9 作战图画布 -->
        <div class="battle-map" id="battleMap">
            <!-- 地图背景纹理 -->
            <div class="map-bg"></div>
            
            <!-- 顶部标题栏 -->
            <header class="header">
                <div class="header-content">
                    <h1 class="main-title">
                        <span class="title-highlight">苏州轨道交通11号线</span>
                        <span class="title-normal">商业开发作战图</span>
                    </h1>
                    <p class="sub-title">SUZHOU METRO LINE 11 COMMERCIAL DEVELOPMENT BATTLE MAP</p>
                </div>
                <!-- 顶部操作栏 -->
                <div class="top-actions">
                    <button class="btn btn-print" onclick="app.printMap()">🖨️ 打印作战图</button>
                    <button class="btn btn-export" onclick="app.exportData()">📥 导出数据</button>
                    <button class="btn btn-import" onclick="document.getElementById('importFile').click()">📤 导入数据</button>
                    <input type="file" id="importFile" accept=".json" style="display:none" onchange="app.importData(this)">
                    <button class="btn btn-reset" onclick="app.resetData()">🔄 恢复默认</button>
                    <button class="btn btn-save" onclick="app.saveNow()">💾 立即保存</button>
                </div>
            </header>

            <!-- 全局统计面板 -->
            <section class="stats-panel">
                <div class="stats-title">
                    <span class="stats-label">全线商业概况</span>
                    <span class="stats-date">（统计截至：<span class="editable" data-field="statsDate">2024年5月20日</span>）</span>
                </div>
                <div class="stats-grid">
                    <!-- 由 JS 动态生成 -->
                </div>
            </section>

            <!-- 图例说明 -->
            <div class="legend-panel">
                <h3>图例说明</h3>
                <div class="legend-section">
                    <div class="legend-item"><span class="legend-line line-m11"></span> <span>11号线</span></div>
                    <div class="legend-item"><span class="legend-line line-other"></span> <span>其他线路</span></div>
                    <div class="legend-item"><span class="legend-station transfer"></span> <span>换乘站</span></div>
                    <div class="legend-item"><span class="legend-station normal"></span> <span>一般站点</span></div>
                </div>
                <div class="legend-section">
                    <h4>商铺状态说明</h4>
                    <div class="legend-item"><span class="status-icon status-rented"></span> <span>已出租</span></div>
                    <div class="legend-item"><span class="status-icon status-renovating"></span> <span>装修中</span></div>
                    <div class="legend-item"><span class="status-icon status-vacant"></span> <span>空置</span></div>
                </div>
            </div>

            <!-- 商业价值分级 -->
            <div class="grade-panel">
                <h3>商业价值分级</h3>
                <p class="grade-subtitle">（综合客流、区位、周边商圈）</p>
                <div class="grade-list" id="gradeList">
                    <!-- 由 JS 动态生成 -->
                </div>
            </div>

            <!-- SVG 地铁线路层 -->
            <svg class="metro-lines" id="metroLines" viewBox="0 0 2520 1080" preserveAspectRatio="xMidYMid meet">
                <!-- 由 JS 动态生成 -->
            </svg>

            <!-- 站点卡片层 -->
            <div class="stations-layer" id="stationsLayer">
                <!-- 由 JS 动态生成 -->
            </div>

            <!-- 底部备注 -->
            <footer class="footer">
                <span>*出租率 = 已出租商铺 / 商铺总数</span>
                <span>*数据为模拟数据，仅供参考</span>
                <span>*统计截止：<span class="editable" data-field="statsDate">2024年5月20日</span></span>
            </footer>
        </div>
    </div>

    <!-- 站点编辑模态框 -->
    <div class="modal" id="stationModal">
      <div class="modal-title">编辑站点数据</div>
      <div class="modal-body">
        <div class="editor-form" id="stationForm">
          <div class="editor-field full-width">
            <label>站点名称</label>
            <input type="text" id="editName" />
          </div>
          <div class="editor-field">
            <label>商业价值等级</label>
            <select id="editGrade">
              <option value="S">S级（核心商圈/换乘）</option>
              <option value="A">A级（重点发展站）</option>
              <option value="B">B级（潜力提升站）</option>
              <option value="C">C级（培育优化站）</option>
            </select>
          </div>
          <div class="editor-field">
            <label>商铺总数</label>
            <input type="number" id="editTotal" min="0" />
          </div>
          <div class="editor-field">
            <label>已出租</label>
            <input type="number" id="editRented" min="0" />
          </div>
          <div class="editor-field">
            <label>空置</label>
            <input type="number" id="editVacant" min="0" />
          </div>
          <div class="editor-field">
            <label>装修中</label>
            <input type="number" id="editRenovating" min="0" />
          </div>
          <div class="editor-field">
            <label>坐标 X</label>
            <input type="number" id="editX" min="0" />
          </div>
          <div class="editor-field">
            <label>坐标 Y</label>
            <input type="number" id="editY" min="0" />
          </div>
          <div class="editor-field">
            <label>卡片位置</label>
            <select id="editPos">
              <option value="top">上方</option>
              <option value="bottom">下方</option>
              <option value="left">左侧</option>
              <option value="right">右侧</option>
              <option value="bottom-right">右下</option>
            </select>
          </div>
          <div class="editor-field">
            <label>换乘站</label>
            <select id="editTransfer">
              <option value="false">否</option>
              <option value="true">是</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-reset" onclick="app.closeModal()">取消</button>
        <button class="btn btn-save" onclick="app.saveStationEdit()">保存</button>
      </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
