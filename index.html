<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>经营总览 - 苏州地铁11号线商业信息综合平台</title>
  <link rel="stylesheet" href="css/platform.css?v=19">
  <link rel="stylesheet" href="css/home-dashboard.css?v=1">
</head>
<body>
  <main class="home-dashboard">
    <section id="dashboard-hero" class="dashboard-hero" aria-labelledby="dashboard-hero-title"></section>

    <section id="dashboard-kpis" class="dashboard-kpis" aria-label="核心经营指标"></section>

    <section id="dashboard-trend" class="dashboard-section dashboard-trend" aria-labelledby="dashboard-trend-title">
      <div class="dashboard-section-heading">
        <div>
          <p class="dashboard-section-kicker">全线经营态势</p>
          <h2 id="dashboard-trend-title">站点商业趋势</h2>
        </div>
        <p>按线路顺序查看商业点位、已出租与空置数量</p>
      </div>
      <div id="trendChart" class="dashboard-trend-mount"></div>
    </section>

    <section id="layer-stations" class="dashboard-section dashboard-stations" aria-label="站点经营概览"></section>
  </main>

  <script type="module" src="js/pages/home-page.js?v=1"></script>
</body>
</html>
